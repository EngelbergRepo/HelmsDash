<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="HelmsDash — A medieval endless runner. Sprint through cobblestone streets as a knight, dodge mine-carts and collect gold coins!" />
  <title>HelmsDash — Medieval Endless Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0806;
      font-family: 'Cinzel', serif;
      color: #e8d5a0;
    }
    #app {
      width: 100%; height: 100%;
      position: relative;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
  <script async src="https://vibej.am/2026/widget.js"></script>
</body>
</html>
